<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task & User Manager</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background: #f4f4f4; }
        .container { display: flex; gap: 30px; flex-wrap: wrap; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex: 1; min-width: 300px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background: #f2f2f2; }
        input, button { margin: 5px; padding: 8px; }
        button { cursor: pointer; background: #007bff; color: white; border: none; border-radius: 4px; }
        button.delete { background: #dc3545; }
        button.done { background: #28a745; }
        .error { color: red; font-size: 0.9em; }
    </style>
</head>
<body>
    <h1>📋 Task & User Manager</h1>
    <div class="container">
        <!-- Sección de Tareas -->
        <div class="card">
            <h2>✅ Tareas</h2>
            <form id="taskForm">
                <input type="text" id="taskContent" placeholder="Contenido de la tarea" required>
                <button type="submit">Agregar</button>
            </form>
            <table id="tasksTable">
                <thead>
                    <tr><th>ID</th><th>Contenido</th><th>Completada</th><th>Acciones</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <!-- Sección de Usuarios -->
        <div class="card">
            <h2>👥 Usuarios</h2>
            <form id="userForm">
                <input type="text" id="userName" placeholder="Nombre" required>
                <input type="text" id="userLastname" placeholder="Apellido" required>
                <input type="text" id="userCity" placeholder="Ciudad" required>
                <input type="text" id="userCountry" placeholder="País" required>
                <input type="text" id="userCode" placeholder="Código postal" required>
                <button type="submit">Crear Usuario</button>
            </form>
            <table id="usersTable">
                <thead>
                    <tr><th>ID</th><th>Nombre</th><th>Apellido</th><th>Dirección</th><th>Acciones</th></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>

    <script>
        // ---------- TAREAS ----------
        async function loadTasks() {
            const res = await fetch('/tasks');
            const data = await res.json();
            const tbody = document.querySelector('#tasksTable tbody');
            tbody.innerHTML = '';
            data.tasks.forEach(task => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = task.id;
                row.insertCell(1).innerText = task.content;
                row.insertCell(2).innerText = task.done ? 'Sí' : 'No';
                const actions = row.insertCell(3);
                const doneBtn = document.createElement('button');
                doneBtn.innerText = '✔️';
                doneBtn.className = 'done';
                doneBtn.onclick = () => markDone(task.id);
                const deleteBtn = document.createElement('button');
                deleteBtn.innerText = '🗑️';
                deleteBtn.className = 'delete';
                deleteBtn.onclick = () => deleteTask(task.id);
                actions.appendChild(doneBtn);
                actions.appendChild(deleteBtn);
            });
        }

        async function addTask(content) {
            const res = await fetch('/tasks', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({content})
            });
            if (res.ok) loadTasks();
            else alert('Error al agregar tarea');
        }

        async function markDone(id) {
            await fetch(`/tasks/${id}`, {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({done: true})
            });
            loadTasks();
        }

        async function deleteTask(id) {
            await fetch(`/tasks/${id}`, {method: 'DELETE'});
            loadTasks();
        }

        document.getElementById('taskForm').onsubmit = (e) => {
            e.preventDefault();
            const input = document.getElementById('taskContent');
            if (input.value.trim()) {
                addTask(input.value.trim());
                input.value = '';
            }
        };

        // ---------- USUARIOS ----------
        async function loadUsers() {
            const res = await fetch('/users');
            const data = await res.json();
            const tbody = document.querySelector('#usersTable tbody');
            tbody.innerHTML = '';
            data.users.forEach(user => {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = user.id;
                row.insertCell(1).innerText = user.name;
                row.insertCell(2).innerText = user.lastname;
                row.insertCell(3).innerText = `${user.address.city}, ${user.address.country} (${user.address.code})`;
                const actions = row.insertCell(4);
                const deleteBtn = document.createElement('button');
                deleteBtn.innerText = '🗑️';
                deleteBtn.className = 'delete';
                deleteBtn.onclick = () => deleteUser(user.id);
                actions.appendChild(deleteBtn);
            });
        }

        async function addUser(userData) {
            const res = await fetch('/users', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(userData)
            });
            if (res.ok) loadUsers();
            else alert('Error al crear usuario');
        }

        async function deleteUser(id) {
            await fetch(`/users/${id}`, {method: 'DELETE'});
            loadUsers();
        }

        document.getElementById('userForm').onsubmit = (e) => {
            e.preventDefault();
            const name = document.getElementById('userName').value.trim();
            const lastname = document.getElementById('userLastname').value.trim();
            const city = document.getElementById('userCity').value.trim();
            const country = document.getElementById('userCountry').value.trim();
            const code = document.getElementById('userCode').value.trim();
            if (name && lastname && city && country && code) {
                addUser({
                    name, lastname,
                    address: { city, country, code }
                });
                document.getElementById('userForm').reset();
            } else {
                alert('Completa todos los campos');
            }
        };

        // Cargar datos al iniciar
        loadTasks();
        loadUsers();
    </script>
</body>
</html>
